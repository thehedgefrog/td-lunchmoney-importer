name: Build Executables

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Pre-release checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run test suite
      run: |
        python -m py_compile importer.py lunchmoney/*.py
        python -m unittest discover -s tests -p "test_*.py" -v

    - name: Validate release version tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        python - <<'PY'
        import re
        from pathlib import Path

        ref = "${{ github.ref_name }}"
        m = re.match(r"^v(\d+\.\d+\.\d+)$", ref)
        if not m:
            raise SystemExit(f"Tag '{ref}' must follow vX.Y.Z")

        expected = m.group(1)
        init_text = Path("lunchmoney/__init__.py").read_text(encoding="utf-8")
        vm = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
        if not vm:
            raise SystemExit("Could not find __version__ in lunchmoney/__init__.py")

        actual = vm.group(1)
        if actual != expected:
            raise SystemExit(
                f"Version mismatch: tag is {expected} but __version__ is {actual}"
            )

        print(f"Version check passed: {actual}")
        PY

  build:
    needs: checks
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            asset_name: td-lunchmoney-importer-windows-x64.exe
          - os: macos-latest
            asset_name: td-lunchmoney-importer-macos-arm64
          - os: ubuntu-latest
            asset_name: td-lunchmoney-importer-linux-x64

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python 3.11
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      uses: sayyid5416/pyinstaller@v1.8.0
      with:
        python_ver: '3.11'
        spec: 'importer.py'
        requirements: 'requirements.txt'
        options: --onefile --name "td-lunchmoney-importer"

    - name: Prepare Release Asset
      run: |
        mkdir -p releases
        mv dist/td-lunchmoney-importer* releases/${{ matrix.asset_name }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2.5.0
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      with:
        files: releases/${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact (for non-release builds)
      uses: actions/upload-artifact@v7.0.0
      if: github.event_name != 'release'
      with:
        name: ${{ matrix.asset_name }}
        path: releases/${{ matrix.asset_name }}