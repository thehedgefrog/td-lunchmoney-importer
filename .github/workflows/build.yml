name: build

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Pre-release checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run test suite
      run: |
        python -m py_compile importer.py lunchmoney/*.py lunchmoney/gui/*.py
        python -m unittest discover -s tests -p "test_*.py" -v

    - name: Validate release version tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        python - <<'PY'
        import re
        from pathlib import Path

        ref = "${{ github.ref_name }}"
        m = re.match(r"^v(\d+\.\d+\.\d+)(?:[\-\.](.+))?$", ref)
        if not m:
          raise SystemExit(f"Tag '{ref}' must follow vX.Y.Z or vX.Y.Z-suffix")

        expected = m.group(1)
        suffix = m.group(2)
        init_text = Path("lunchmoney/__init__.py").read_text(encoding="utf-8")
        vm = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
        if not vm:
            raise SystemExit("Could not find __version__ in lunchmoney/__init__.py")

        actual = vm.group(1)

        # Allow __version__ to match either X.Y.Z or X.Y.Z-suffix
        if suffix:
          if actual != f"{expected}-{suffix}":
            raise SystemExit(
              f"Version mismatch: tag is {expected}-{suffix} but __version__ is {actual}"
            )
        else:
          if actual != expected:
            raise SystemExit(
              f"Version mismatch: tag is {expected} but __version__ is {actual}"
            )

        print(f"Version check passed: {actual}")
        PY

  build:
    needs: checks
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            asset_name: td-lunchmoney-importer-windows-x64.exe
            pyinstaller_icon_opt: '--icon "resources/lmfinal-32.ico"'
            pyinstaller_data_opt: '--add-data "resources;resources"'
          - os: ubuntu-latest
            asset_name: td-lunchmoney-importer-linux-x64
            pyinstaller_icon_opt: ''
            pyinstaller_data_opt: '--add-data "resources:resources"'

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python 3.11
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      uses: sayyid5416/pyinstaller@v1.8.0
      with:
        python_ver: '3.11'
        spec: 'importer.py'
        requirements: 'requirements.txt'
        options: --onefile --windowed --copy-metadata lunchable ${{ matrix.pyinstaller_data_opt }} ${{ matrix.pyinstaller_icon_opt }} --name "td-lunchmoney-importer"

    - name: Prepare Release Asset
      run: |
        mkdir -p releases
        mv dist/td-lunchmoney-importer* releases/${{ matrix.asset_name }}

    - name: Upload build artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: ${{ matrix.asset_name }}
        path: releases/${{ matrix.asset_name }}

  publish-release:
    name: Publish release assets
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Download build artifacts
      uses: actions/download-artifact@v6.0.0
      with:
        path: releases

    - name: Flatten artifact directories
      run: |
        mkdir -p release-files
        find releases -type f -exec mv {} release-files/ \;

    - name: Ensure release exists and upload assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ github.ref_name }}"
        gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes
        gh release upload "$TAG" release-files/* --clobber