name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile smoke check
      run: |
        python -m py_compile importer.py lunchmoney/*.py

    - name: Import smoke check
      run: |
        python -c "import importer, lunchmoney"

    - name: Run unit tests
      run: |
        python -m unittest discover -s tests -p "test_*.py" -v

  build-smoke:
    name: Build Smoke (${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Set up Python 3.11
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      uses: sayyid5416/pyinstaller@v1.8.0
      with:
        python_ver: '3.11'
        spec: 'importer.py'
        requirements: 'requirements.txt'
        options: --onefile --name "td-lunchmoney-importer"

    - name: Upload smoke artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: smoke-${{ matrix.os }}
        path: dist/td-lunchmoney-importer*
        if-no-files-found: error
